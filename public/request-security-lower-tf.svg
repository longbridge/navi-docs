<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 188"
     font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13">
  <defs>
    <style>
      .muted    { fill: #64748b }
      .bar-f    { fill: #e0f2fe; stroke: #7dd3fc }
      .bar-t    { fill: #0369a1 }
      .min-f    { fill: #eff6ff; stroke: #93c5fd }
      .last-f   { fill: #e0f2fe; stroke: #60a5fa }
      .arr-f    { fill: #f0fdf4; stroke: #4ade80 }
      .arr-t    { fill: #15803d }
      .arrow    { stroke: #64748b; fill: none }
      .idx      { fill: #94a3b8 }
      .dots     { fill: #94a3b8 }
    </style>
    <marker id="d" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Daily bar label + box -->
  <text x="0" y="38" class="muted" font-size="12" dominant-baseline="middle">Daily bar</text>
  <rect x="70" y="20" width="500" height="34" rx="4" class="bar-f" stroke-width="1.5"/>
  <text x="320" y="38" text-anchor="middle" class="bar-t" font-size="12" font-weight="600" dominant-baseline="middle">2024-01-15</text>

  <!-- 1-min bars label -->
  <text x="0" y="90" class="muted" font-size="12" dominant-baseline="middle">1-min bars</text>

  <!-- minute bars -->
  <rect x="70"  y="68" width="54" height="30" rx="3" class="min-f" stroke-width="1"/>
  <rect x="130" y="68" width="54" height="30" rx="3" class="min-f" stroke-width="1"/>
  <rect x="190" y="68" width="54" height="30" rx="3" class="min-f" stroke-width="1"/>
  <rect x="250" y="68" width="54" height="30" rx="3" class="min-f" stroke-width="1"/>
  <text x="320" y="82" text-anchor="middle" class="dots" font-size="18" dominant-baseline="middle">···</text>
  <rect x="456" y="68" width="54" height="30" rx="3" class="min-f" stroke-width="1"/>
  <rect x="516" y="68" width="54" height="30" rx="3" class="last-f" stroke-width="1.5"/>

  <text x="97"  y="83" text-anchor="middle" class="bar-t" font-size="11" dominant-baseline="middle">09:30</text>
  <text x="157" y="83" text-anchor="middle" class="bar-t" font-size="11" dominant-baseline="middle">09:31</text>
  <text x="217" y="83" text-anchor="middle" class="bar-t" font-size="11" dominant-baseline="middle">09:32</text>
  <text x="277" y="83" text-anchor="middle" class="bar-t" font-size="11" dominant-baseline="middle">09:33</text>
  <text x="483" y="83" text-anchor="middle" class="bar-t" font-size="11" dominant-baseline="middle">15:59</text>
  <text x="543" y="79" text-anchor="middle" class="bar-t" font-size="11" dominant-baseline="middle">16:00</text>
  <text x="543" y="93" text-anchor="middle" class="bar-t" font-size="10" dominant-baseline="middle">✓</text>

  <!-- down arrow -->
  <line x1="320" y1="102" x2="320" y2="120" class="arrow" stroke-width="1.5" marker-end="url(#d)"/>

  <!-- array result label -->
  <text x="0" y="148" class="muted" font-size="12" dominant-baseline="middle">array&lt;float&gt;</text>

  <!-- array box -->
  <rect x="70" y="132" width="500" height="32" rx="4" class="arr-f" stroke-width="1.5"/>
  <text x="85"  y="148" text-anchor="start" class="arr-t" font-size="12" dominant-baseline="middle">[ 178.4,</text>
  <text x="175" y="148" text-anchor="start" class="arr-t" font-size="12" dominant-baseline="middle">179.1,</text>
  <text x="247" y="148" text-anchor="start" class="arr-t" font-size="12" dominant-baseline="middle">178.9,</text>
  <text x="319" y="148" text-anchor="start" class="idx"   font-size="13" dominant-baseline="middle">···</text>
  <text x="360" y="148" text-anchor="start" class="arr-t" font-size="12" dominant-baseline="middle">182.2,</text>
  <text x="434" y="148" text-anchor="start" class="arr-t" font-size="12" dominant-baseline="middle">182.5 ]</text>

  <!-- index labels -->
  <text x="97"  y="176" text-anchor="middle" class="idx" font-size="10">[0]</text>
  <text x="167" y="176" text-anchor="middle" class="idx" font-size="10">[1]</text>
  <text x="237" y="176" text-anchor="middle" class="idx" font-size="10">[2]</text>
  <text x="455" y="176" text-anchor="middle" class="idx" font-size="10">[n-2]</text>
  <text x="520" y="176" text-anchor="middle" class="idx" font-size="10">[n-1]</text>
</svg>
