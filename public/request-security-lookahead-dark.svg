<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 205"
     font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13">
  <defs>
    <style>
      .text     { fill: #cbd5e1 }
      .muted    { fill: #64748b }
      .sep      { stroke: #1e293b }
      .week-f   { fill: #14532d; stroke: #16a34a }
      .week-t   { fill: #4ade80 }
      .off-f    { fill: #431407; stroke: #c2410c }
      .off-t    { fill: #fb923c }
      .on-f     { fill: #2e1065; stroke: #7c3aed }
      .on-t     { fill: #a78bfa }
      .warn     { fill: #f87171 }
      .warn-l   { stroke: #f87171 }
    </style>
  </defs>

  <!-- column headers -->
  <text x="147" y="20" text-anchor="middle" class="muted" font-size="12">Mon</text>
  <text x="232" y="20" text-anchor="middle" class="muted" font-size="12">Tue</text>
  <text x="317" y="20" text-anchor="middle" class="muted" font-size="12">Wed</text>
  <text x="402" y="20" text-anchor="middle" class="muted" font-size="12">Thu</text>
  <text x="487" y="20" text-anchor="middle" class="text" font-size="12" font-weight="600">Fri ✓</text>

  <line x1="112" y1="30" x2="524" y2="30" class="sep" stroke-width="1"/>

  <!-- row labels -->
  <text x="0" y="62"  class="muted" font-size="12" dominant-baseline="middle">weekly bar</text>
  <text x="0" y="113" class="muted" font-size="12" dominant-baseline="middle">lookahead</text>
  <text x="0" y="125" class="muted" font-size="12" dominant-baseline="middle">.off</text>
  <text x="0" y="163" class="muted" font-size="12" dominant-baseline="middle">lookahead</text>
  <text x="0" y="175" class="muted" font-size="12" dominant-baseline="middle">.on</text>

  <!-- weekly bar -->
  <rect x="114" y="42" width="405" height="38" rx="4" class="week-f" stroke-width="1.5"/>
  <text x="317" y="63" text-anchor="middle" class="week-t" font-size="12" font-weight="600" dominant-baseline="middle">close = 185.00</text>

  <!-- lookahead.off row -->
  <rect x="114" y="92" width="65" height="30" rx="4" class="off-f" stroke-width="1"/>
  <rect x="199" y="92" width="65" height="30" rx="4" class="off-f" stroke-width="1"/>
  <rect x="284" y="92" width="65" height="30" rx="4" class="off-f" stroke-width="1"/>
  <rect x="369" y="92" width="65" height="30" rx="4" class="off-f" stroke-width="1"/>
  <rect x="454" y="92" width="65" height="30" rx="4" class="week-f" stroke-width="1.5"/>
  <text x="147" y="107" text-anchor="middle" class="off-t" font-size="12" dominant-baseline="middle">181.20</text>
  <text x="232" y="107" text-anchor="middle" class="off-t" font-size="12" dominant-baseline="middle">182.50</text>
  <text x="317" y="107" text-anchor="middle" class="off-t" font-size="12" dominant-baseline="middle">183.80</text>
  <text x="402" y="107" text-anchor="middle" class="off-t" font-size="12" dominant-baseline="middle">184.30</text>
  <text x="487" y="107" text-anchor="middle" class="week-t" font-size="12" font-weight="600" dominant-baseline="middle">185.00</text>

  <!-- lookahead.on row -->
  <rect x="114" y="148" width="65" height="30" rx="4" class="on-f" stroke-width="1.5"/>
  <rect x="199" y="148" width="65" height="30" rx="4" class="on-f" stroke-width="1.5"/>
  <rect x="284" y="148" width="65" height="30" rx="4" class="on-f" stroke-width="1.5"/>
  <rect x="369" y="148" width="65" height="30" rx="4" class="on-f" stroke-width="1.5"/>
  <rect x="454" y="148" width="65" height="30" rx="4" class="week-f" stroke-width="1.5"/>
  <text x="147" y="163" text-anchor="middle" class="on-t" font-size="12" dominant-baseline="middle">185.00</text>
  <text x="232" y="163" text-anchor="middle" class="on-t" font-size="12" dominant-baseline="middle">185.00</text>
  <text x="317" y="163" text-anchor="middle" class="on-t" font-size="12" dominant-baseline="middle">185.00</text>
  <text x="402" y="163" text-anchor="middle" class="on-t" font-size="12" dominant-baseline="middle">185.00</text>
  <text x="487" y="163" text-anchor="middle" class="week-t" font-size="12" font-weight="600" dominant-baseline="middle">185.00</text>

  <!-- future leak annotation -->
  <line x1="114" y1="184" x2="436" y2="184" class="warn-l" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="275" y="184" text-anchor="middle" class="warn" font-size="11" dy="11">⚠ future value on Mon–Thu</text>
</svg>
