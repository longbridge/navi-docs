# Website asset generation tasks.  Run from repo root: cargo make website
#
# This task generates all pre-built assets required by the navi-docs submodule
# and commits them into the submodule repo. To build the site itself, run
# `npm run build` (or `npm run build:full`) inside website/.
#
# chart-local and lsp tasks are imported from wasm/Makefile.toml via the root Makefile.toml.
# doc-json task is imported from crates/docgen/Makefile.toml via the root Makefile.toml.
[config]
default_to_workspace = false

[env]
ROOT = "${CARGO_MAKE_WORKING_DIRECTORY}"
SITE = "${CARGO_MAKE_WORKING_DIRECTORY}/website"

# -- Individual steps --------------------------------------------------------

# Copy release WASM packages into the website submodule directory.
# chart-local uses --features local (in-process VM) with release-wasm profile.
# lsp uses release-wasm profile.
[tasks.wasm-copy-to-website]
private = true
workspace = false
command = "node"
args = [
    "-e",
    "const fs=require('fs');fs.cpSync(process.argv[1],process.argv[2],{recursive:true,force:true});fs.cpSync(process.argv[3],process.argv[4],{recursive:true,force:true});fs.rmSync(process.argv[2]+'/.gitignore',{force:true});fs.rmSync(process.argv[4]+'/.gitignore',{force:true})",
    "${ROOT}/wasm/chart/pkg-local",
    "${SITE}/wasm-pkg/chart",
    "${ROOT}/wasm/lsp/pkg",
    "${SITE}/wasm-pkg/lsp",
]

# Install Node.js dependencies in the website submodule (needed for generate-stdlib-docs.mjs).
[tasks.npm-install]
private = true
workspace = false
cwd = "${SITE}"
script_runner = "@shell"
script = ["npm install --prefer-offline"]

# Convert stdlib-docs.*.json (generated by doc-json) into VitePress markdown pages.
[tasks.generate-stdlib-docs]
private = true
workspace = false
cwd = "${SITE}"
script_runner = "@shell"
script = ["node scripts/generate-stdlib-docs.mjs"]

# Package the Navi skill as a zip for users to download.
[tasks.package-skill]
private = true
workspace = false

[tasks.package-skill.linux]
script_runner = "@shell"
script = ["rm -f \"${SITE}/public/navi-skill.zip\" && cd \"${SITE}/skills\" && zip -qr \"../public/navi-skill.zip\" \"navi\""]

[tasks.package-skill.mac]
script_runner = "@shell"
script = ["rm -f \"${SITE}/public/navi-skill.zip\" && cd \"${SITE}/skills\" && zip -qr \"../public/navi-skill.zip\" \"navi\""]

[tasks.package-skill.windows]
script_runner = "@shell"
script = ["powershell -Command \"Compress-Archive -Path '${SITE}/skills/navi' -DestinationPath '${SITE}/public/navi-skill.zip' -Force\""]

# Package the VS Code extension (bundles the wasm LSP + formatter via its own
# build) and copy the resulting .vsix into public/ so it can be downloaded.
# The .vsix is git-ignored and regenerated on each build, like navi-skill.zip.
[tasks.package-vscode-extension]
private = true
workspace = false
cwd = "${ROOT}/crates/lsp/editors/vscode"
script_runner = "@shell"
script = ["npm install --prefer-offline", "npm run package"]

[tasks.copy-vsix-to-website]
private = true
workspace = false
dependencies = ["package-vscode-extension"]
command = "node"
args = [
    "-e",
    "require('fs').copyFileSync(process.argv[1], process.argv[2])",
    "${ROOT}/crates/lsp/editors/vscode/navi-0.1.0.vsix",
    "${SITE}/public/navi-vscode.vsix",
]

# Commit all generated assets into the navi-docs submodule repo.
# The "git diff --cached --quiet || git commit" pattern is idempotent:
# it only creates a commit when files actually changed.
[tasks.commit-website-assets]
private = true
workspace = false
cwd = "${SITE}"
script_runner = "@shell"
script = [
    "git add wasm-pkg/ api/stdlib/ zh-CN/api/stdlib/ zh-HK/api/stdlib/ stdlib-sidebar.json",
    'git diff --cached --quiet || git commit -m "chore: update generated assets"',
]

# -- Composite task ----------------------------------------------------------

[tasks.website]
category = "Website"
description = "Generate and commit all pre-built assets into the navi-docs submodule (WASM, stdlib docs, skill zip)"
workspace = false
dependencies = [
    "chart-local",
    "lsp",
    "wasm-copy-to-website",
    "doc-json",
    "npm-install",
    "generate-stdlib-docs",
    "package-skill",
    "copy-vsix-to-website",
    "commit-website-assets",
]
